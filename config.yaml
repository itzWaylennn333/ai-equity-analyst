# =====================================================================
# GLOBAL platform configuration & defaults.
# ---------------------------------------------------------------------
# Company-specific values live in companies/<TICKER>.yaml and OVERRIDE these.
# Values left `null` here are AUTO-DERIVED from the company's own history at
# runtime (see src/assumptions.py), so the platform can value ANY ticker with
# sensible defaults the user then tunes. PayPal (companies/PYPL.yaml) supplies
# explicit, hand-approved assumptions instead of auto-derivation.
# =====================================================================

data:
  cache_dir: "data/raw"
  processed_dir: "data/processed"
  manifest: "data/raw/_manifest.json"
  sec_user_agent: "AI Equity Analyst research@example.com"   # SEC EDGAR fair-access: set to your own name + email
  ticker_cik_map: "https://www.sec.gov/files/company_tickers.json"
  price_history_years: 6
  financials_years: 5
  cache_max_age_days: 7

# Regional equity risk premia (Damodaran). USD default; extend per region as needed.
erp:
  default: 0.0423
  source: "Damodaran implied ERP (S&P 500), 4.23% as of 2026-01-01 vintage"

# Sentiment engine (platform Layer 2a). method: lexicon | finbert | llm
# - lexicon: finance lexicon, no heavy deps (default; works anywhere)
# - finbert: ProsusAI/finbert via transformers (needs `pip install transformers torch`)
# - llm: graded sentiment + aspects via an Ollama-compatible endpoint (e.g. the DGX Spark)
sentiment:
  method: "llm"
  lexicon_path: null            # point at the Loughran-McDonald master CSV for full coverage
  llm_endpoint: "http://localhost:11434"   # Ollama-compatible; localhost = running on the DGX Spark itself
  llm_model: "qwen3:30b-a3b-instruct-2507-q4_K_M"   # MoE 3.3B-active: clean non-thinking JSON, ~8x faster than dense 32B on GB10's bandwidth wall

# Credibility & noise layer (platform Layer 2b). Down-weights low-quality / untrustworthy
# nodes before aggregating sentiment, and flags manipulation/noise. See docs/ARCHITECTURE.md s5.
credibility:
  enabled: true
  min_relevance: 0.0            # on-topic gate; 0 keeps all document chunks, raise (e.g. 0.3) for social
  dedup_jaccard: 0.85           # near-duplicate threshold (k-shingle Jaccard)
  min_alpha_ratio: 0.55         # below = low-info (XBRL tag / number soup)
  min_words: 25
  source_weights: {}            # override per-source trust (defaults from sentiment.SOURCE_WEIGHTS)
  news_source_seeds: {}         # per-domain news credibility, e.g. {reuters.com: 0.9, seekingalpha.com: 0.5}

# RAG / grounded extraction (platform Layer 3 / P6). Hybrid dense+BM25 retrieval over ingested
# chunks, then cite-or-abstain figure extraction. All local: embeddings via Ollama, store in LanceDB.
rag:
  embed_model: "bge-m3"         # Ollama embedding model (1024-d); pull with `ollama pull bge-m3`
  embed_endpoint: null          # -> sentiment.llm_endpoint
  llm_endpoint: null            # -> sentiment.llm_endpoint
  llm_model: null               # -> sentiment.llm_model (qwen3 2507)
  top_k: 5                      # passages passed to the extractor
  candidates: 30                # per-retriever shortlist before RRF fusion
  rrf_k: 60                     # Reciprocal Rank Fusion constant
  min_similarity: 0.45          # retrieval-confidence gate (top cosine); below -> "not found"
  rerank: "llm"                 # "llm" (torch-free listwise, default) | "cross-encoder" | "none"
  rerank_pool: 12               # fused candidates reranked down to top_k
  rerank_model: "BAAI/bge-reranker-v2-m3"   # used when rerank=="cross-encoder" (needs `pip install sentence-transformers`; runs on GPU)
  verify_support: true          # Self-RAG faithfulness check (LLM-as-judge) on the extracted figure
  index_dir: "data/processed/{ticker}/lancedb"
  # RAPTOR tree index (optional navigation layer; summaries are NOT citable source -> leaves only for extraction)
  raptor:
    enabled: false
    max_levels: 3
    cluster_size: 6

# Default valuation skeleton. Company files override; `null` -> derived from history.
defaults:
  valuation:
    horizon_years: 5
    tax_rate: null              # -> normalized effective tax from history (clamped 12-30%)
    marginal_tax_rate: 0.24
    sbc_treatment: "expense"    # treat stock-based comp as a real cost
    net_debt_basis: "strict"    # total debt - cash & equivalents
    terminal:
      method: "both"            # Gordon growth AND exit-multiple
      growth: null              # -> min(2.5%, cap)
      growth_cap: 0.04          # HARD CAP (long-run nominal GDP)
      exit_ev_ebitda: null      # -> core-peer median EV/EBITDA (clamped 5-15x)
    wacc:
      risk_free_source: "live_10y_ust"
      risk_free_fallback: 0.0449
      equity_risk_premium: null # -> erp.default
      erp_source: null          # -> erp.source
      beta: null                # -> yfinance beta (fallback 1.1)
      beta_source: "yfinance reported beta"
      cost_of_debt: null        # -> interest expense / total debt (clamped 2-9%)
    projections:
      revenue_growth: null      # -> historical CAGR tapered toward terminal growth
      ebit_margin: null         # -> recent 3y avg operating margin, held flat
      da_pct_revenue: null      # -> recent 3y D&A / revenue
      capex_pct_revenue: null   # -> recent 3y capex / revenue
      nwc_pct_revenue: 0.010    # modest default working-capital drag
  scenarios: null               # -> parametric bull/base/bear derived from the base case

# Sector templates: which valuation framework applies (integrity guardrail mirroring
# the brief's "avoid banks/insurers/early biotech" rule -- the engine routes or declines).
sector_templates:
  standard:    { method: "dcf_comps",   note: "DCF + comparables (default)" }
  financials:  { method: "unsupported", note: "Banks/insurers need residual-income / P-B-ROE, not FCFF DCF" }
  reit:        { method: "ffo_nav",     note: "Use FFO/AFFO multiples and NAV, not FCFF DCF" }
  biotech_dev: { method: "unsupported", note: "Pre-revenue/single-asset biotech is binary/clinical, not DCF" }

# Default output paths (per-ticker namespaced). Company files may override (PYPL keeps flat).
output:
  charts_dir: "outputs/{ticker}/charts"
  tables_dir: "outputs/{ticker}/tables"
  note_md: "outputs/{ticker}/research_note.md"
  pdf_path: "outputs/{ticker}/research_note.pdf"
  render: "pandoc_latex"
