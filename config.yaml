# =====================================================================
# Equity Research Model Configuration -- PayPal Holdings, Inc. (PYPL)
# ---------------------------------------------------------------------
# Single source of truth for the valuation. Change inputs here and re-run
# `python run.py` to reproduce the entire analysis (charts, tables, note).
#
# INTEGRITY NOTE: values marked `# TODO[P3]` / `# TODO[P4]` are PLACEHOLDERS
# to be SET and BENCHMARKED at the relevant Phase checkpoint. They are NOT
# final, are not yet justified, and must not be cited until approved.
# =====================================================================

company:
  name: "PayPal Holdings, Inc."
  ticker: "PYPL"
  cik: "0001633917"          # SEC EDGAR Central Index Key
  currency: "USD"
  fiscal_year_end: "12-31"   # PayPal reports on a calendar year

data:
  cache_dir: "data/raw"
  processed_dir: "data/processed"
  manifest: "data/raw/_manifest.json"   # provenance log (source, url, ts) per pull
  sec_user_agent: "AI Equity Analyst research@example.com"  # SEC requires a UA
  price_history_years: 6
  financials_years: 5          # years of historical financials to analyze
  cache_max_age_days: 7        # re-pull a cached file only if older than this

# Comparable companies.
#   core    -> drive the peer-multiple medians used in the comps valuation
#   anchors -> card networks shown for CONTEXT ONLY (toll-road economics differ;
#              excluded from the median so they don't inflate the implied value)
# Peer set is provisional; finalized & justified at the Phase 3 checkpoint.
peers:
  core:
    - { ticker: "XYZ",      name: "Block, Inc.",        rationale: "Closest pure peer: payments + Cash App consumer wallet" }
    - { ticker: "FI",       name: "Fiserv",             rationale: "Merchant acquiring + Clover; scaled processor" }
    - { ticker: "GPN",      name: "Global Payments",    rationale: "Pure merchant acquiring" }
    - { ticker: "ADYEN.AS", name: "Adyen",              rationale: "Enterprise unbranded processor; direct Braintree rival (EUR-listed)" }
    - { ticker: "FIS",      name: "Fidelity Natl Info", rationale: "Banking + merchant payment processing" }
  anchors:
    - { ticker: "V",        name: "Visa",               rationale: "Card network -- context only, excluded from median" }
    - { ticker: "MA",       name: "Mastercard",         rationale: "Card network -- context only, excluded from median" }

valuation:
  horizon_years: 5             # explicit DCF window before terminal value
  tax_rate: 0.23               # normalized tax for NOPAT & FCFF (FY25 GAAP eff. 16.8% was
                               # tax-credit flattered; US marginal ~24% -> normalize to 23%)
  marginal_tax_rate: 0.24      # used for after-tax cost of debt in WACC
  sbc_treatment: "expense"     # treat stock-based comp as a REAL cost (do NOT add back)
  net_debt_basis: "strict"     # strict = total debt - cash & equiv (conservative);
                               # excludes pass-through customer funds & loans receivable

  terminal:
    method: "both"             # compute Gordon growth AND exit-multiple; show both
    growth: 0.025              # 2.5%, well below the 4% cap and long-run nominal GDP
    growth_cap: 0.04           # HARD CAP (integrity guardrail enforced in tests/)
    exit_ev_ebitda: 9.0        # provisional; refined from peer median in comps (Phase 3)

  wacc:
    risk_free_source: "live_10y_ust"  # pull current US 10Y Treasury yield live (^TNX)
    risk_free_fallback: 0.0449         # 10Y UST as of 2026-06-15 pull, if live fetch fails
    equity_risk_premium: 0.0423        # Damodaran implied ERP, S&P 500
    erp_source: "Damodaran implied ERP (S&P 500), 4.23% as of 2026-01-01 vintage"
    beta: 1.30                         # central est: 5y wkly 1.43, 2y wkly 1.22, yfinance 1.34
    beta_source: "yfinance 1.336, cross-checked vs regression on ^GSPC (1.22-1.43)"
    cost_of_debt: 0.0442               # FY25 interest expense / total debt (IG profile)

  # Base-case projection drivers (FY2026E-FY2030E). Balanced ~4% growth posture.
  # Benchmarked: revenue growth tapers from FY25's +4.3% (take-rate drag) but stays
  # positive (volume + new monetization); margins drift up modestly on efficiency.
  projections:
    revenue_growth:  [0.045, 0.045, 0.040, 0.038, 0.035]  # ~4.1% CAGR
    ebit_margin:     [0.183, 0.184, 0.185, 0.186, 0.187]  # ~flat from FY25 GAAP 18.3%
                                                          # (modest efficiency, mostly reinvested)
    da_pct_revenue:  0.029     # FY25 D&A 2.9% of revenue
    capex_pct_revenue: 0.026   # FY25 capex 2.6% of revenue (asset-light)
    nwc_pct_revenue: 0.005     # modest working-capital drag (core ops, ex pass-through)

# Bull / base / bear -- each a COHERENT set of assumption changes (not just +/-10%).
scenarios:                   # TODO[P4]
  bull: { probability: null, notes: "" }
  base: { probability: null, notes: "" }
  bear: { probability: null, notes: "" }

output:
  charts_dir: "outputs/charts"
  tables_dir: "outputs/tables"
  note_md: "note/research_note.md"
  pdf_path: "outputs/research_note.pdf"
  render: "pandoc_latex"     # primary; automatic fallback -> weasyprint
